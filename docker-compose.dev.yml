version: "3.9"

services:
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    ports:
      - "8001:8001"
    volumes:
      - ./analyzer:/app/analyzer      # source code mount for hot reload
      - ./data:/data                  # local data/ → /data
    environment:
      - STORAGE_ROOT=/data/storage
      - LOG_LEVEL=debug
      - YOLO_MODEL=yolov8m-pose.pt
    command: >
      uvicorn analyzer.main:app
      --host 0.0.0.0 --port 8001
      --reload --reload-dir /app/analyzer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
