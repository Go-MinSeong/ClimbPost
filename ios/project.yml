# Regenerate: xcodegen generate --spec project.yml
name: ClimbPost
options:
  bundleIdPrefix: com.climbpost
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  ClimbPost:
    type: application
    platform: iOS
    sources:
      - path: ClimbPost/App
      - path: ClimbPost/Auth
      - path: ClimbPost/Common
      - path: ClimbPost/Gallery
      - path: ClimbPost/Upload
      - path: ClimbPost/Result
      - path: ClimbPost/Share
      - path: ClimbPost/Push
      - path: ClimbPost/Resources/gyms.json
        buildPhase: resources
      - path: ClimbPost/Resources/color_maps
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.climbpost.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ClimbPost/Info.plist
        GENERATE_INFOPLIST_FILE: NO
    entitlements:
      path: ClimbPost/ClimbPost.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
