# Regenerate: xcodegen generate --spec project.yml
name: ClimbPost
options:
  bundleIdPrefix: com.climbpost
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  ClimbPost:
    type: application
    platform: iOS
    sources:
      - path: ClimbPost/App
      - path: ClimbPost/Auth
      - path: ClimbPost/Common
      - path: ClimbPost/Gallery
      - path: ClimbPost/Upload
      - path: ClimbPost/Result
      - path: ClimbPost/Share
      - path: ClimbPost/Push
    resources:
      - path: ../data/gyms.json
      - path: ../data/color_maps
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.climbpost.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "ClimbPost needs access to your photo library to find climbing videos"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "ClimbPost uses your location to match videos with climbing gyms"
        INFOPLIST_KEY_UIBackgroundModes: "fetch remote-notification"
    entitlements:
      path: ClimbPost/ClimbPost.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
